<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Outer shield -->
  <path d="M256 28 L462 120 C462 120 472 320 256 484 C40 320 50 120 50 120 Z"
        fill="url(#shieldGrad)" opacity="0.15"/>

  <!-- Inner shield -->
  <path d="M256 60 L432 138 C432 138 440 310 256 452 C72 310 80 138 80 138 Z"
        fill="url(#innerGrad)"/>

  <!-- Keyhole: circle -->
  <circle cx="256" cy="210" r="52" fill="white"/>

  <!-- Keyhole: trapezoid slot -->
  <path d="M230 240 L226 340 C226 348 234 354 256 354 C278 354 286 348 286 340 L282 240 Z"
        fill="white"/>

  <!-- Inner shadow on keyhole for depth -->
  <circle cx="256" cy="210" r="30" fill="url(#innerGrad)" opacity="0.2"/>
</svg>
